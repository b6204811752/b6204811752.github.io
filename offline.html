<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="You are offline - Car Rental Ranchi">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#004e89">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <title>You're Offline | Car Rental Ranchi</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #004e89 0%, #ff6b35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            color: white;
            max-width: 500px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .offline-title {
            font-size: 32px;
            margin-bottom: 15px;
        }
        .offline-message {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }
        .contact-info {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .contact-info h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .phone-number {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }
        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
        }
        .retry-btn {
            background: white;
            color: #004e89;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📶</div>
        <h1 class="offline-title">You're Offline</h1>
        <p class="offline-message">
            It looks like you've lost your internet connection. 
            Don't worry, you can still reach us directly!
        </p>
        
        <div class="contact-info">
            <h3>Call or WhatsApp us directly:</h3>
            <a href="tel:+917488341848" class="phone-number">+91 7488341848</a>
            <p style="opacity: 0.8; margin-bottom: 10px;">Available 24/7 for bookings</p>
            <a href="https://wa.me/917488341848" class="whatsapp-link">
                📱 WhatsApp Us
            </a>
        </div>
        
        <button class="retry-btn" onclick="window.location.reload()">
            🔄 Try Again
        </button>
    </div>

    <!-- Vercel Analytics & Speed Insights -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
